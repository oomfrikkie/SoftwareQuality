name: CI (DTAP)

on:
  push:
    branches:
      - develop
      - main
      - production
  pull_request:
    branches:
      - develop
      - main
      - production

jobs:

  development:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Ensure bin directory exists
        run: mkdir -p bin

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Compile Java files
        run: |
          find ./src -name "*.java" > sources.txt
          javac -d bin @sources.txt

      - name: Run Checkstyle
        uses: actions/checkout@v4
        with:
          repository: checkstyle/checkstyle
          ref: master
        continue-on-error: true
      - name: Run Checkstyle (Java)
        run: |
          wget -q https://github.com/checkstyle/checkstyle/releases/download/checkstyle-10.12.4/checkstyle-10.12.4-all.jar -O checkstyle.jar
          java -jar checkstyle.jar -c /google_checks.xml src/ || true

      - name: Run JUnit tests
        run: |
          # Assuming tests are in src/ and use JUnit 4/5
          # You may need to adjust this for your project structure
          # This is a placeholder for running tests
          echo "No test runner configured. Add test runner here."

      - name: Build JAR
        run: |
          jar cf Jabberpoint-IT.jar -C bin .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jabberpoint-IT-development
          path: Jabberpoint-IT.jar

  test:
    runs-on: ubuntu-latest
    needs: development
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Jabberpoint-IT-development

      - name: Run integration tests
        run: |
          echo "Integration tests would run here."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jabberpoint-IT-test
          path: Jabberpoint-IT.jar

  acceptance:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Jabberpoint-IT-test

      - name: Acceptance checks
        run: |
          echo "Acceptance checks would run here."

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Jabberpoint-IT-acceptance
          path: Jabberpoint-IT.jar

  production:
    runs-on: ubuntu-latest
    needs: acceptance
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: Jabberpoint-IT-acceptance

      - name: Deploy to production location
        run: |
          echo "Deploying to production location."
          # Add deployment commands here (e.g., scp, rsync, upload to server)
